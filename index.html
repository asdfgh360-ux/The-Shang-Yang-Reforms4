<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商鞅变法 - 策略博弈版</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-card: #242424;
      --bg-hover: #2a2a2a;
      --border: #333333;
      --border-highlight: #c9a86c;
      --text-primary: #e8e6e3;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --gold: #c9a86c;
      --gold-light: #e8d5a3;
      --red: #dc2626;
      --red-dark: #991b1b;
      --green: #22c55e;
      --green-dark: #166534;
      --blue: #3b82f6;
      --purple: #a855f7;
      --orange: #f97316;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    h1, h2, h3, h4 {
      font-family: 'Noto Serif SC', serif;
    }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 5px var(--gold); } 50% { box-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold); } }
    @keyframes dangerPulse { 0%, 100% { box-shadow: 0 0 5px var(--red); } 50% { box-shadow: 0 0 20px var(--red); } }

    .fade-in { animation: fadeIn 0.5s ease; }
    .slide-up { animation: slideUp 0.5s ease; }
    .pulse { animation: pulse 2s infinite; }
    .shake { animation: shake 0.3s ease; }

    /* Intro */
    .intro {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }

    /* 点阵背景纹理 */
    .intro::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle, #444 1px, transparent 1px);
      background-size: 20px 20px;
      animation: fadeIn 2s ease;
      pointer-events: none;
    }

    .intro-content {
      position: relative;
      z-index: 1;
      max-width: 700px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .intro-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(201, 168, 108, 0.3), rgba(201, 168, 108, 0.1));
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      animation: glow 3s ease-in-out infinite;
    }

    .intro-icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.5;
    }

    .intro-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .intro-title {
      font-size: 3.5rem;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(201, 168, 108, 0.3);
      margin-bottom: 12px;
      letter-spacing: 12px;
      font-weight: 700;
    }

    .intro-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    .intro-card {
      background: rgba(36, 36, 36, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      width: 100%;
    }

    .intro-card p {
      color: var(--text-secondary);
      line-height: 2;
      margin-bottom: 16px;
      font-size: 0.9375rem;
    }

    .intro-card p:last-child {
      margin-bottom: 0;
    }

    .intro-card strong {
      color: var(--gold);
      font-weight: 600;
    }

    .intro-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .intro-tag {
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      transition: all 0.3s ease;
    }

    .intro-tag:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .intro-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 48px;
      background: linear-gradient(135deg, var(--gold), #a08050);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .intro-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(201, 168, 108, 0.4);
    }

    .intro-btn svg {
      width: 20px;
      height: 20px;
    }

    /* 规则说明 */
    .intro-rules {
      position: absolute;
      right: 40px;
      bottom: 40px;
      background: rgba(36, 36, 36, 0.95);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 20px 24px;
      max-width: 280px;
      z-index: 10;
    }

    .intro-rules-title {
      font-size: 0.875rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .intro-rules-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .intro-rules-item:last-child {
      margin-bottom: 0;
    }

    .intro-rules-item span {
      color: var(--gold);
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .intro-rules {
        position: relative;
        right: auto;
        bottom: auto;
        margin-top: 24px;
        max-width: 100%;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), #a08050);
      color: var(--bg-primary);
    }

    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 168, 108, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
    }

    .btn-outline:hover {
      background: rgba(201, 168, 108, 0.1);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-large {
      padding: 20px 48px;
      font-size: 1.125rem;
    }

    /* Game Header */
    .game-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .turn-info {
      display: flex;
      flex-direction: column;
    }

    .turn-label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .turn-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Noto Serif SC', serif;
    }

    .progress-bar {
      width: 200px;
      height: 8px;
      background: var(--bg-card);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-fill.time {
      background: linear-gradient(90deg, var(--green), var(--gold));
    }

    .progress-fill.danger {
      background: linear-gradient(90deg, var(--orange), var(--red));
    }

    /* Resources */
    .resources-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .resource-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 120px;
    }

    .resource-item.critical {
      border-color: var(--red);
      animation: dangerPulse 2s infinite;
    }

    .resource-icon {
      font-size: 1.25rem;
    }

    .resource-info {
      display: flex;
      flex-direction: column;
    }

    .resource-name {
      font-size: 0.625rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .resource-value {
      font-size: 1.125rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .resource-change {
      font-size: 0.625rem;
      margin-left: 4px;
    }

    .resource-change.positive {
      color: var(--green);
    }

    .resource-change.negative {
      color: var(--red);
    }

    /* Action Points */
    .action-points {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: linear-gradient(135deg, rgba(201, 168, 108, 0.15), rgba(201, 168, 108, 0.05));
      border: 1px solid var(--gold);
      border-radius: 12px;
    }

    .ap-icon {
      font-size: 1.5rem;
    }

    .ap-info {
      display: flex;
      flex-direction: column;
    }

    .ap-label {
      font-size: 0.625rem;
      color: var(--gold);
    }

    .ap-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
    }

    /* Game Board */
    .game-board {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 24px;
    }

    @media (max-width: 1024px) {
      .game-board {
        grid-template-columns: 1fr;
      }
    }

    /* Main Area */
    .main-area {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Threat Level */
    .threat-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .threat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .threat-header h3 {
      font-size: 1rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .threat-level {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .threat-level.low {
      background: var(--green-dark);
      color: var(--green);
    }

    .threat-level.medium {
      background: rgba(249, 115, 22, 0.2);
      color: var(--orange);
    }

    .threat-level.high {
      background: var(--red-dark);
      color: var(--red);
      animation: dangerPulse 2s infinite;
    }

    .threat-bars {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .threat-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .threat-name {
      width: 80px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .threat-bar-bg {
      flex: 1;
      height: 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
      overflow: hidden;
    }

    .threat-bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    .threat-bar-fill.noble {
      background: linear-gradient(90deg, var(--blue), var(--purple));
    }

    .threat-bar-fill.enemy {
      background: linear-gradient(90deg, var(--orange), var(--red));
    }

    .threat-bar-fill.corruption {
      background: linear-gradient(90deg, #666, #999);
    }

    .threat-value {
      width: 40px;
      text-align: right;
      font-size: 0.875rem;
      font-weight: 600;
    }

    /* Policy Cards */
    .policies-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-header h2 {
      font-size: 1.25rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-badge {
      padding: 4px 12px;
      background: var(--bg-secondary);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .policies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .policy-card {
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .policy-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .policy-card:hover::before {
      transform: scaleX(1);
    }

    .policy-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    .policy-card.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .policy-card.disabled:hover {
      transform: none;
      border-color: var(--border);
      box-shadow: none;
    }

    .policy-card.disabled::before {
      display: none;
    }

    .policy-card.implemented {
      border-color: var(--green);
      background: rgba(34, 197, 94, 0.05);
    }

    .policy-card.implemented::before {
      background: var(--green);
      transform: scaleX(1);
    }

    .policy-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .policy-name {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      font-family: 'Noto Serif SC', serif;
    }

    .policy-card.implemented .policy-name {
      color: var(--green);
    }

    .policy-cost {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: rgba(201, 168, 108, 0.15);
      border-radius: 4px;
      font-size: 0.75rem;
      color: var(--gold);
      font-weight: 600;
    }

    .policy-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .policy-effects {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .effect-tag {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .effect-tag.positive {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }

    .effect-tag.negative {
      background: rgba(220, 38, 38, 0.15);
      color: var(--red);
    }

    .effect-tag.neutral {
      background: rgba(59, 130, 246, 0.15);
      color: var(--blue);
    }

    .policy-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .policy-year {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .success-rate {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .success-rate.high {
      color: var(--green);
    }

    .success-rate.medium {
      color: var(--orange);
    }

    .success-rate.low {
      color: var(--red);
    }

    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .panel h3 {
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Event Log */
    .event-log {
      max-height: 300px;
      overflow-y: auto;
    }

    .event-item {
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      margin-bottom: 8px;
      border-left: 3px solid var(--gold);
    }

    .event-item:last-child {
      margin-bottom: 0;
    }

    .event-item.danger {
      border-left-color: var(--red);
      background: rgba(220, 38, 38, 0.05);
    }

    .event-item.success {
      border-left-color: var(--green);
      background: rgba(34, 197, 94, 0.05);
    }

    .event-turn {
      font-size: 0.625rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .event-text {
      font-size: 0.875rem;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* End Turn Button */
    .end-turn-panel {
      background: linear-gradient(135deg, rgba(201, 168, 108, 0.15), rgba(201, 168, 108, 0.05));
      border: 1px solid var(--gold);
    }

    .end-turn-panel p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .btn-end-turn {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-end-turn:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 168, 108, 0.3);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      padding: 24px;
      animation: slideUp 0.3s ease;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-size: 1.5rem;
      color: var(--text-primary);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section h4 {
      font-size: 0.875rem;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .modal-section p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .risk-warning {
      padding: 16px;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .risk-warning h4 {
      color: var(--red);
      margin-bottom: 8px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-actions .btn {
      flex: 1;
    }

    /* Event Modal */
    .event-modal .modal-content {
      max-width: 600px;
      border-color: var(--red);
    }

    .event-modal.danger .modal-content {
      animation: shake 0.5s ease;
    }

    .event-title {
      font-size: 1.5rem;
      color: var(--red);
      margin-bottom: 8px;
    }

    .event-desc {
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .event-choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

      padding: 16px;

      cursor: pointer;
      transition: all 0.2s;
    }

      border-color: var(--gold);
      background: var(--bg-hover);
    }

      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .choice-consequence {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Game Over */
    .game-over {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--bg-primary);
    }

    .game-over-content {
      max-width: 700px;
      width: 100%;
      text-align: center;
    }

    .result-badge {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      font-size: 4rem;
      font-weight: 700;
      animation: pulse 2s infinite;
    }

    .result-badge.victory {
      background: linear-gradient(135deg, var(--green), #166534);
      color: white;
      box-shadow: 0 0 60px rgba(34, 197, 94, 0.4);
    }

    .result-badge.defeat {
      background: linear-gradient(135deg, var(--red), #7f1d1d);
      color: white;
      box-shadow: 0 0 60px rgba(220, 38, 38, 0.4);
    }

    .game-over h1 {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

      color: var(--green);
    }

    .game-over h1.defeat {

    .game-over p {
      font-size: 1.125rem;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    /* Tooltip */
    .tooltip {
      position: relative;
    }

    .tooltip:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--text-primary);
      white-space: nowrap;
      z-index: 10;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }
  </style>
</head>

            <span className={`threat-level ${level.class}`}>{level.text}</span>
          </div>
          <div className="threat-bars">
            {threats.map(t => (
              <div key={t.key} className="threat-item">
                <span className="threat-name">{t.name}</span>
                <div className="threat-bar-bg">
                  <div className={`threat-bar-fill ${t.key}`} style={{ width: `${clamp(t.value, 0, 100)}%` }} />
                </div>
                <span className="threat-value" style={{ 
                  color: t.value > 70 ? '#dc2626' : t.value > 40 ? '#f97316' : '#22c55e' 
                }}>{t.value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const PolicyCard = ({ policy, state, onClick }) => {
      const completedIds = state.completedPolicies || [];
      const isImplemented = completedIds.includes(policy.id);
      const canAffordPolicy = canAfford(state, policy.cost);
      const requirementsMet = checkRequirements(state, policy);
      const isDisabled = isImplemented || !canAffordPolicy || !requirementsMet;

      const getSuccessRate = () => {
        if (policy.risk === 0) return { text: '必成', class: 'high' };
        if (policy.risk < 15) return { text: '高', class: 'high' };
        if (policy.risk < 30) return { text: '中', class: 'medium' };
        return { text: '低', class: 'low' };
      };

      const rate = getSuccessRate();
      
      // 计算金币成本和收益
      const goldCost = policy.cost.gold || 0;
      const goldGain = policy.effects.gold || 0;
      const hasGoldEffect = goldCost > 0 || goldGain > 0;

      return (
        <div 
          className={`policy-card ${isImplemented ? 'implemented' : ''} ${isDisabled ? 'disabled' : ''}`}
          onClick={() => !isDisabled && onClick(policy)}
        >
          <div className="policy-header">
            <h3 className="policy-name">{policy.name}</h3>
            <span className="policy-cost">
              <Icons.AP /> {policy.cost.ap}
              {goldCost > 0 && <span style={{ marginLeft: '4px' }}>· {goldCost}金</span>}
            </span>
          </div>
          <p className="policy-desc">{policy.desc}</p>
          <div className="policy-effects">
            {Object.entries(policy.effects).map(([key, val]) => {
              if (!val) return null;
              const labels = { 
                nationalPower: '国力', military: '军力', publicSupport: '民心',
                food: '粮草', gold: '金钱', population: '人口',
                nobleDiscontent: '贵族不满', enemyThreat: '外敌', corruption: '贪腐'
              };
              const isNeg = key.includes('Discontent') || key.includes('Threat') || key.includes('corruption');
              return (
                <span key={key} className={`effect-tag ${isNeg ? 'negative' : 'positive'}`}>
                  {labels[key] || key} {val > 0 ? '+' : ''}{val}
                </span>
              );
            })}
          </div>
          <div className="policy-footer">
            <span className="policy-year">公元前{policy.year}年</span>
            {!isImplemented && (
              <span className={`success-rate ${rate.class}`}>
                成功率: {rate.text}
              </span>
            )}
          </div>
        </div>
      );
    };

    const PolicyModal = ({ policy, state, onClose, onImplement }) => {
      if (!policy) return null;
      
      const [result, setResult] = useState(null);
      
      const handleImplement = () => {
        const roll = Math.random() * 100;
        const success = roll > policy.risk;
        setResult({ success, roll });
      };

      const handleClose = () => {
        if (result) {
          onImplement(policy, result.success);
          setResult(null);
        }
        onClose();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h2>{policy.name}</h2>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            
            <div className="modal-section">
              <h4>政策详情</h4>
              <p>{policy.detail}</p>
            </div>

            {policy.risk > 0 && (
              <div className="risk-warning">
                <h4><Icons.Alert /> 风险提示</h4>
                <p>此政策有 {policy.risk}% 的失败风险。若失败，将损失资源且可能引发贵族不满。</p>
              </div>
            )}

            {result ? (
              <div style={{ textAlign: 'center', padding: '20px' }}>
                <div style={{ fontSize: '3rem', marginBottom: '16px' }}>
                  {result.success ? <Icons.Check /> : <Icons.Fire />}
                </div>
                <h3 style={{ color: result.success ? '#22c55e' : '#dc2626', marginBottom: '20px' }}>
                  {result.success ? '推行成功！' : '推行失败！'}
                </h3>
                <button className="btn btn-gold" onClick={handleClose}>
                  确定
                </button>
              </div>
            ) : (
              <div className="modal-actions">
                <button className="btn btn-outline" onClick={onClose}>再考虑</button>
                <button className="btn btn-gold" onClick={handleImplement}>
                  <Icons.AP /> 推行 ({policy.cost.ap} AP)
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };

    const EventModal = ({ event, onChoice }) => {
      if (!event) return null;
      return (
        <div className={`modal-overlay event-modal ${event.type === 'danger' ? 'danger' : ''}`}>
          <div className="modal-content">
            <h2 className="event-title"><Icons.Danger /> {event.title}</h2>
            <p className="event-desc">{event.desc}</p>
            <div className="event-choices">
              {event.choices.map((choice, idx) => (
                <button key={idx} className="choice-btn" onClick={() => onChoice(choice)}>
                  <span className="choice-text">{choice.text}</span>
                  <span className="choice-consequence">{choice.desc}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const GameOver = ({ state, onRestart }) => {
      const isVictory = state.victory;
      
      return (
        <div className="game-over">
          <div className="game-over-content">
            <div className={`result-badge ${isVictory ? 'victory' : 'defeat'}`}>
              {isVictory ? <Icons.Star /> : <Icons.Skull />}
            </div>
            <h1 className={isVictory ? 'victory' : 'defeat'}>
              {isVictory ? '变法大成！' : '变法失败'}
            </h1>
            <p>{state.reason}</p>
            
            <div className="stats-grid">
              <div className="stat-card">
                <div className="stat-value">{state.reformsCompleted}</div>
                <div className="stat-label">完成改革</div>
              </div>
              <div className="stat-card">
                <div className="stat-value">{state.nationalPower}</div>
                <div className="stat-label">最终国力</div>
              </div>
              <div className="stat-card">
                <div className="stat-value">{state.turn}</div>
                <div className="stat-label">消耗回合</div>
              </div>
            </div>
            
            <button className="btn btn-gold btn-large" onClick={onRestart}>
              <Icons.Crown /> 重新开始
            </button>
          </div>
        </div>
      );
    };

    // Main Game Component
    const App = () => {
      const [state, setState] = useState({ ...INITIAL_STATE, completedPolicies: [] });
      const [showPolicy, setShowPolicy] = useState(null);
      const [showEvent, setShowEvent] = useState(null);

      const checkGameEnd = useCallback((newState) => {
        if (newState.turn > MAX_TURNS) {
          if (newState.reformsCompleted >= 6 && newState.nationalPower >= 80) {
            return { gameOver: true, victory: true, reason: '你在20回合内完成了变法大业！秦国从此强盛，为日后统一六国奠定基础。' };
          }
          return { gameOver: true, victory: false, reason: '时间耗尽，变法未能完成。秦国继续积弱，最终被六国所灭。' };
        }
        if (newState.publicSupport <= 0) {
          return { gameOver: true, victory: false, reason: '民心尽失，百姓揭竿而起！你被愤怒的民众杀死，变法彻底失败。' };
        }
        if (newState.nobleDiscontent >= 100) {
          return { gameOver: true, victory: false, reason: '贵族发动政变！你被车裂处死，新法被废，一切努力化为乌有。' };
        }
        if (newState.reformsCompleted >= 6 && newState.nationalPower >= 80) {
          return { gameOver: true, victory: true, reason: '变法大成！秦国国力日盛，成为战国霸主，为统一六国奠定基础。' };
        }
        return { gameOver: false };
      }, []);

      const implementPolicy = (policy, success) => {
        setState(prev => {
          const newState = { ...prev };
          
          // Deduct costs
          newState.actionPoints -= policy.cost.ap;
          newState.gold -= policy.cost.gold || 0;
          newState.food -= policy.cost.food || 0;
          
          if (success) {
            // Apply effects
            Object.entries(policy.effects).forEach(([key, val]) => {
              if (newState[key] !== undefined) {
                newState[key] = clamp(newState[key] + val, 0, 200);
              }
            });
            newState.reformsCompleted++;
            newState.completedPolicies = [...newState.completedPolicies, policy.id];
            newState.eventHistory = [`✓ 推行${policy.name}成功`, ...newState.eventHistory].slice(0, 10);
          } else {
            // Failure consequences
            newState.nobleDiscontent = clamp(newState.nobleDiscontent + 10, 0, 100);
            newState.gold = clamp(newState.gold - 10, 0, 999);
            newState.eventHistory = [`✗ ${policy.name}推行失败，贵族不满增加`, ...newState.eventHistory].slice(0, 10);
          }
          
          setShowPolicy(null);
          
          const endCheck = checkGameEnd(newState);
          if (endCheck.gameOver) {
            return { ...newState, ...endCheck };
          }
          
          return newState;
        });
      };

      const endTurn = () => {
        setState(prev => {
          let newState = { 
            ...prev, 
            turn: prev.turn + 1, 
            year: prev.year - 1,
            actionPoints: AP_PER_TURN,
          };
          
          // Passive changes
          newState.food = clamp(newState.food - 5, 0, 999);
          newState.gold = clamp(newState.gold + 5, 0, 999);
          newState.corruption = clamp(newState.corruption + 2, 0, 100);
          
          // Random event
          if (Math.random() < 0.4) {
            const event = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
            setShowEvent(event);
          }
          
          const endCheck = checkGameEnd(newState);
          if (endCheck.gameOver) {
            return { ...newState, ...endCheck };
          }
          
          return newState;
        });
      };

      const handleEventChoice = (choice) => {
        setState(prev => {
          const effects = choice.effect(prev);
          const newState = { ...prev };
          
          Object.entries(effects).forEach(([key, val]) => {
            if (newState[key] !== undefined) {
              newState[key] = clamp(newState[key] + val, 0, 999);
            }
          });
          
          newState.eventHistory = [`! ${choice.desc}`, ...newState.eventHistory].slice(0, 10);
          setShowEvent(null);
          
          const endCheck = checkGameEnd(newState);
          if (endCheck.gameOver) {
            return { ...newState, ...endCheck };
          }
          
          return newState;
        });
      };

      const restart = () => {
        setState({ ...INITIAL_STATE, completedPolicies: [] });
        setShowPolicy(null);
        setShowEvent(null);
      };

      if (state.gameOver) {
        return <GameOver state={state} onRestart={restart} />;
      }

      if (state.turn === 0) {
        return <IntroScene onStart={() => setState({ ...state, turn: 1 })} />;
      }

      const availablePolicies = POLICIES.filter(p => {
        const completed = state.completedPolicies || [];
        return !completed.includes(p.id) && checkRequirements(state, p);
      });

      const completedPolicies = POLICIES.filter(p => {
        const completed = state.completedPolicies || [];
        return completed.includes(p.id);
      });

      return (
        <>
          <GameHeader state={state} />
          
          <div className="game-board">
            <div className="main-area">
              <ThreatPanel state={state} />
              
              <div className="policies-section">
                <div className="section-header">
                  <h2><Icons.Scroll /> 变法政策</h2>
                  <span className="section-badge">
                    已完成: {state.reformsCompleted} / {state.totalReforms}
                  </span>
                </div>
                <div className="policies-grid">
                  {availablePolicies.map(policy => (
                    <PolicyCard 
                      key={policy.id} 
                      policy={policy} 
                      state={state}
                      onClick={setShowPolicy}
                    />
                  ))}
                </div>
              </div>

              {completedPolicies.length > 0 && (
                <div className="policies-section" style={{ border: '1px solid #22c55e', background: 'rgba(34, 197, 94, 0.05)' }}>
                  <div className="section-header">
                    <h2><Icons.Check /> 已推行政策</h2>
                    <span className="section-badge" style={{ background: 'rgba(34, 197, 94, 0.2)', color: '#22c55e' }}>
                      {completedPolicies.length} 项
                    </span>
                  </div>
                  <div className="policies-grid">
                    {completedPolicies.map(policy => (
                      <PolicyCard 
                        key={policy.id} 
                        policy={policy} 
                        state={state}
                        onClick={setShowPolicy}
                      />
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div className="sidebar">
              <div className="panel end-turn-panel">
                <h3><Icons.Time /> 回合控制</h3>
                <p>剩余行动点: {state.actionPoints}</p>
                <p style={{ fontSize: '0.75rem', color: '#666', marginTop: '8px' }}>
                  结束回合将推进时间，并可能触发随机事件
                </p>
                <button 
                  className="btn-end-turn" 
                  onClick={endTurn}
                  disabled={showEvent !== null}
                >
                  结束回合 <Icons.Time />
                </button>
              </div>

              <div className="panel">
                <h3><Icons.Alert /> 事件记录</h3>
                <div className="event-log">
                  {state.eventHistory.length === 0 ? (
                    <p style={{ color: '#666', fontSize: '0.875rem' }}>暂无事件</p>
                  ) : (
                    state.eventHistory.map((evt, i) => (
                      <div key={i} className={`event-item ${evt.includes('!') ? 'danger' : evt.includes('✓') ? 'success' : ''}`}>
                        <div className="event-turn">第{state.turn - i}回合</div>
                        <div className="event-text">{evt}</div>
                      </div>
                    ))
                  )}
                </div>
              </div>

              <div className="panel">
                <h3><Icons.Crown /> 国家实力</h3>
                <div className="threat-bars" style={{ marginTop: '12px' }}>
                  <div className="threat-item">
                    <span className="threat-name">国力</span>
                    <div className="threat-bar-bg">
                      <div className="threat-bar-fill noble" style={{ width: `${clamp(state.nationalPower, 0, 100)}%` }} />
                    </div>
                    <span className="threat-value" style={{ color: state.nationalPower >= 80 ? '#22c55e' : '#c9a86c' }}>
                      {state.nationalPower}
                    </span>
                  </div>
                  <div className="threat-item">
                    <span className="threat-name">军力</span>
                    <div className="threat-bar-bg">
                      <div className="threat-bar-fill enemy" style={{ width: `${clamp(state.military, 0, 100)}%` }} />
                    </div>
                    <span className="threat-value" style={{ color: '#dc2626' }}>{state.military}</span>
                  </div>
                  <div className="threat-item">
                    <span className="threat-name">民心</span>
                    <div className="threat-bar-bg">
                      <div className="threat-bar-fill" style={{ width: `${clamp(state.publicSupport, 0, 100)}%`, background: '#22c55e' }} />
                    </div>
                    <span className="threat-value" style={{ color: state.publicSupport < 30 ? '#dc2626' : '#22c55e' }}>
                      {state.publicSupport}
                    </span>
                  </div>
                </div>
              </div>

              <div className="panel" style={{ borderColor: 'var(--gold)', background: 'rgba(201, 168, 108, 0.05)' }}>
                <h3 style={{ color: 'var(--gold)' }}>胜利条件</h3>
                <div style={{ marginTop: '12px', fontSize: '0.8125rem', color: 'var(--text-secondary)', lineHeight: 1.8 }}>
                  <p style={{ marginBottom: '6px' }}>在 <strong style={{ color: 'var(--gold)' }}>20回合</strong> 内完成 <strong style={{ color: 'var(--gold)' }}>6次</strong> 改革</p>
                  <p style={{ marginBottom: '6px' }}>国力值达到 <strong style={{ color: 'var(--gold)' }}>80</strong></p>
                  <p style={{ marginBottom: '0' }}>则 <strong style={{ color: 'var(--green)' }}>变法成功</strong></p>
                </div>
              </div>
            </div>
          </div>

          {showPolicy && (
            <PolicyModal 
              policy={showPolicy} 
              state={state}
              onClose={() => setShowPolicy(null)}
              onImplement={implementPolicy}
            />
          )}

          {showEvent && (
            <EventModal 
              event={showEvent}
              onChoice={handleEventChoice}
            />
          )}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
